<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Сканер чеков</title>
	<link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="img/favicon.ico">
    <script src="html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 30px;
            position: relative;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        #scannerModal {
            display: none;
            position: fixed;
            z-index: 1500;
            left: 0; top: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #reader {
            width: 300px;
            margin: 0; 
            background: white;
            border: 1px solid #ccc;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
        }

        #scanButton {
            position: fixed;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            z-index: 3001;
        }

        #results { margin-top: 20px; }
        #results ul { list-style: none; padding: 0; }
        #results li { font-size: 1.2em; color: green; margin-bottom: 8px; }

        #total {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            margin: 0; padding: 10px 0;
            font-size: 2em; font-weight: bold;
            color: darkblue; background-color: white;
            border-top: 1px solid #ccc;
            z-index: 2000;
        }

        #customAlert {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .alert-box {
            background: white; width: 80%; max-width: 300px; padding: 20px; 
            border-radius: 10px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <h1>Сканер чеков</h1>
    <button id="scanButton">Сканировать</button>

    <div id="scannerModal">
        <div id="reader"></div>
    </div>

    <div id="customAlert">
        <div class="alert-box">
            <p id="alertMessage" style="font-size: 18px; margin-bottom: 20px; color: black;"></p>
            <button onclick="closeAlert()" style="padding: 10px 30px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">OK</button>
        </div>
    </div>

    <div id="results">
        <ul id="numberList"></ul>
    </div>

    <div id="total">Итог: 0₽</div>

    <audio id="beep" src="beep.mp3" preload="auto"></audio>

<script>
	const scanButton = document.getElementById("scanButton");
	const reader = document.getElementById("reader");
	const scannerModal = document.getElementById("scannerModal");
	const numberList = document.getElementById("numberList");
	const totalDisplay = document.getElementById("total");
	const beepSound = document.getElementById("beep");

	let scannedItems = [];
	let scannedRawTexts = new Set();
	let html5Qrcode;

	const months = [
		"января", "февраля", "марта", "апреля", "мая", "июня",
		"июля", "августа", "сентября", "октября", "ноября", "декабря"
	];

	function getParam(text, param) {
		const params = new URLSearchParams(text);
		return params.get(param);
	}

	function formatCheckDate(t) {
		if (!t) return "Дата неизвестна";
		try {
			const day = parseInt(t.substring(6, 8));
			const monthIndex = parseInt(t.substring(4, 6)) - 1;
			const hours = t.substring(9, 11);
			const minutes = t.substring(11, 13);
			return `${day} ${months[monthIndex]} ${hours}:${minutes}`;
		} catch (e) { return "Ошибка даты"; }
	}

	function updateDisplay() {
		numberList.innerHTML = "";
		let total = 0;
		scannedItems.forEach(item => {
			const li = document.createElement("li");
			li.textContent = `${item.dateStr} — ${item.amount}₽`;
			numberList.appendChild(li);
			total += item.amount;
		});
		totalDisplay.textContent = `Итог: ${total}₽`;
	}

	async function stopScanner() {
		if (html5Qrcode && html5Qrcode.isScanning) {
			await html5Qrcode.stop();
		}
		scannerModal.style.display = "none";
		scanButton.textContent = "Сканировать";
	}

	function showAlert(message) {
		document.getElementById("alertMessage").textContent = message;
		document.getElementById("customAlert").style.display = "block";
	}

	function closeAlert() {
		document.getElementById("customAlert").style.display = "none";
	}

	scanButton.addEventListener("click", async () => {
		if (!html5Qrcode || !html5Qrcode.isScanning) {
			scanButton.textContent = "Остановить";
			scannerModal.style.display = "block";

			html5Qrcode = new Html5Qrcode("reader");
			try {
				await html5Qrcode.start(
					{ facingMode: "environment" },
					{ fps: 10, qrbox: 250 },
					async (decodedText) => {
						if (scannedRawTexts.has(decodedText)) {
							showAlert("Этот чек уже отсканирован");
							await stopScanner();
							return;
						}

						const sVal = getParam(decodedText, 's');
						const tVal = getParam(decodedText, 't');

						if (sVal && tVal) {
							const now = new Date();
							const currentMonth = now.getMonth();
							const currentYear = now.getFullYear();

							const checkYear = parseInt(tVal.substring(0, 4));
							const checkMonth = parseInt(tVal.substring(4, 6)) - 1;

							const diffMonths = (currentYear - checkYear) * 12 + (currentMonth - checkMonth);

							if (diffMonths === 0) {
								showAlert("Этот чек ещё рано сканировать");
								await stopScanner();
								return;
							} 
							
							if (diffMonths > 1) {
								showAlert("Этот чек уже поздно сканировать");
								await stopScanner();
								return;
							}

							const amount = parseFloat(sVal);
							const dateStr = formatCheckDate(tVal);
							
							scannedRawTexts.add(decodedText);
							scannedItems.push({ amount, dateStr });
							
							updateDisplay();
							beepSound.play().catch(() => {});
							
							await stopScanner();
						}
					}
				);
			} catch (err) {
				scanButton.textContent = "Сканировать";
				scannerModal.style.display = "none";
			}
		} else {
			await stopScanner();
		}
	});
		
	if ('serviceWorker' in navigator) {
	  window.addEventListener('load', () => {
		navigator.serviceWorker.register('sw.js').then(registration => {
		}).catch(error => {
		  console.log('Ошибка регистрации ServiceWorker:', error);
		});
	  });
	}
</script>
</body>
</html>
